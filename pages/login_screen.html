<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Σύνδεση - Secretariat Portal</title>

   <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="../css/style1.css" rel="stylesheet">
</head>

<body>
  <div class="container">
    <nav>
      <div class="logo">
        <a href="../index.html"><img src="../images/logo.svg" alt="" class="logo-icon"><strong>Secretariat Portal</strong></a>
      </div>
      <ul>
        <li class="circle"><a href="user_viewtickets.html"><img src="../images/user.svg" alt="" class="nav-icon"></a></li>
      </ul>
    </nav>
  </div>

  <main>
    <article class="login-card">
      
      <div class="card-header">
        <h3>Συνδεθείτε στον λογαριασμό σας</h3>
      </div>

      <form action="user_viewtickets.html" class="login-body">
        
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>
        
        <a href="#" class="small-link">Forgot password?</a>
        
        <button type="submit" class="submit-btn login-btn">Σύνδεση</button>
        
        <p class="small-link">Don't have an account yet? <a href="#">Sign up.</a></p>        
      </form>
    </article>
  </main>
</body>
</html>
