<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../css/fileAttachment.css">
    <script src="../js/fileAttachment.js" defer></script>
</head>

<body>
    <div class="file-attachment-container">
        <h3 class="file-attachment-title">Επισύναψη Αρχείων</h3>

        <!-- Drag & Drop Zone -->
        <div class="file-upload-zone" id="fileUploadZone">
            <img class="upload-icon" src="../images/upload-cloud-icon.svg" height="87" width="100"></img>
            <p class="upload-text">Σύρετε αρχεία ή κάντε κλικ για επιλογή</p>
            <small class="upload-hint">Υποστηρίζονται PDF, DOC, JPG, PNG (max 10MB)</small>

            <input type="file" id="fileInput" name="attachments" multiple accept=".pdf,.doc,.docx,.jpg,.jpeg,.png"
                class="file-input">
        </div>

        <!-- File List -->
        <div class="file-list has-items" id="fileList">
            <!-- example: -->
             <div class="file-item"> 
                <div class="file-item-icon">PDF</div>
                <div class="file-item-info">
                    <p class="file-item-name">example.pdf</p>
                    <p class="file-item-size">1.2 MB</p>
                </div>
                <button class="file-item-remove" type="button">✕</button>
            </div>
        </div>

        <!-- Error Message -->
        <div class="file-error-message hidden" id="fileError">
            <!-- example: -->
            <p class="file-error-text">Το αρχείο "example.pdf" είναι πολύ μεγάλο (max 10MB)</p>
        </div>
    </div>
</body>

</html>
