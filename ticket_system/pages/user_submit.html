<head>

  <meta charset="UTF-8">

  <link href="../css/navbar.css" rel="stylesheet">
  <script src="../js/script.js" defer></script>
  <script src="../js/profile.js" defer></script>

</head>

<body class="ticket-submit">
  <nav class="navbar tickets-navbar viewtickets-page sticky-top navbar-expand-md">
    <div class="container-fluid">

      <!-- Brand -->
      <a class="navbar-brand gap-1" href="../index.html#opening-section">
        <img src="../images/logo.svg">
        Secretariat Portal
      </a>

      <!-- searchbar -->
      <!-- <div class="search-bar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#A0A0A0" stroke-width="2">
          <circle cx="11" cy="11" r="8"></circle>

      <!-- collapsed menu -->
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>


      <!-- Menu -->
      <div class="collapse navbar-collapse" id="navbarNav">
        
        <ul class="navbar-nav ms-auto align-items-md-center">
          <!--Αιτήματα-->
          <li class="nav-item requests">
            <a class="nav-link" href="user_viewtickets.html">
              <img src="../images/ticket_icon.svg" alt="ticket-svg" class="nav-icon me-2">
              <span>Αιτήματα</span>
            </a>
          </li>
          <!-- User -->
          <li class="nav-item user-icon profile-wrapper">
            <a class="nav-link" href="#" aria-label="Profile menu">
              <img alt="Avatar" id="avatar">
            </a>
            <div class="profile-dropdown"><a href="login_screen.html"><img src="../images/exit.svg" alt=""
                  class="nav-icon">Αποσύνδεση</a>
            </div>
          </li>
        </ul>

      </div>
    </div>
  </nav>

  <main>
  <article class="form-card">
    <div class="card-header">
      <h1>Δημιουργία Αιτήματος</h1>
    </div>

    <form action="#" class="form-grid">
      
      <div class="left-column">
        <label for="category">Κατηγορία Αιτήματος<span class="required">*</span>:</label>
          <select id="category" name="category" required>
            <option value="" disabled selected>Επιλέξτε Κατηγορία...</option>

            <optgroup label="Βεβαιώσεις & Πιστοποιητικά">
              <option value="cert_enrollment">Βεβαίωση Σπουδών (Γενική Χρήση)</option>
              <option value="cert_transcript">Αναλυτική Βαθμολογία</option>
              <option value="cert_military">Πιστοποιητικό για Στρατολογική Χρήση</option>
              <option value="cert_tax">Βεβαίωση για Εφορία / Επίδομα Ενοικίου</option>
              <option value="cert_diploma_copy">Αντίγραφο Πτυχίου / Διπλώματος</option>
            </optgroup>

            <optgroup label="Ακαδημαϊκά Θέματα">
              <option value="acad_registration">Πρόβλημα με την Εγγραφή / Ανανέωση</option>
              <option value="acad_courses">Θέματα Δηλώσεων Μαθημάτων</option>
              <option value="acad_regrading">Αίτηση Αναβαθμολόγησης</option>
              <option value="acad_exam_review">Επανεξέταση Μαθήματος</option>
              <option value="acad_graduation">Αίτηση για Ορκωμοσία / Λήψη Πτυχίου</option>
            </optgroup>

            <optgroup label="Φοιτητική Κατάσταση">
              <option value="status_suspension">Αναστολή Σπουδών</option>
              <option value="status_deletion">Αίτηση Διαγραφής από το Τμήμα</option>
              <option value="status_transfer">Θέματα Μετεγγραφών</option>
              <option value="status_pass">Πρόβλημα με την Ακαδημαϊκή Ταυτότητα (Πάσο)</option>
            </optgroup>

            <optgroup label="Λοιπά">
              <option value="general_query">Γενικό Ερώτημα / Πληροφορίες</option>
              <option value="other">Άλλο (Περιγράψτε παρακάτω)</option>
            </optgroup>

          </select>

        <label for="subject">Θέμα<span class="required">*</span>:</label>
        <input type="text" name="subject" id="subject" required>

        <label for="priority">Προτεραιότητα<span class="required">*</span>:</label>
        <select id="priority" name="priority" required>
          <option value="low">Χαμηλή</option>
          <option value="normal" selected>Κανονική</option>
          <option value="high">Υψηλή (Μόνο για λήξη προθεσμίας)</option>
        </select>

        <label for="fileUpload">Επισύναψη Αρχείου:</label>
        <div class="custom-file-upload">
          <label for="fileUpload" class="plus-btn"></label>
          <input type="file" id="fileUpload" name="fileUpload">
        </div>
      </div>

      <div class="middle-column">
        <label for="department">Τμήμα<span class="required">*</span>:</label>
          <select id="department" name="department" required>
            <option value="" disabled selected>Επιλέξτε Τμήμα...</option>

            <optgroup label="Πολυτεχνική Σχολή">
              <option value="arch">Αρχιτεκτόνων Μηχανικών</option>
              <option value="ece">Ηλεκτρολόγων Μηχανικών και Τεχνολογίας Υπολογιστών</option>
              <option value="ceid">Μηχανικών Η/Υ και Πληροφορικής</option>
              <option value="mead">Μηχανολόγων και Αεροναυπηγών Μηχανικών</option>
              <option value="civil">Πολιτικών Μηχανικών</option>
              <option value="chemeng">Χημικών Μηχανικών</option>
            </optgroup>

            <optgroup label="Σχολή Θετικών Επιστημών">
              <option value="biology">Βιολογίας</option>
              <option value="geology">Γεωλογίας</option>
              <option value="matsci">Επιστήμης των Υλικών</option>
              <option value="math">Μαθηματικών</option>
              <option value="physics">Φυσικής</option>
              <option value="chemistry">Χημείας</option>
            </optgroup>

            <optgroup label="Σχολή Επιστημών Υγείας">
              <option value="med">Ιατρικής</option>
              <option value="pharmacy">Φαρμακευτικής</option>
            </optgroup>

            <optgroup label="Σχολή Επιστημών Αποκατάστασης Υγείας">
              <option value="speech">Λογοθεραπείας</option>
              <option value="nursing">Νοσηλευτικής</option>
              <option value="physio">Φυσικοθεραπείας</option>
            </optgroup>

            <optgroup label="Σχολή Οικονομικών Επιστημών & Διοίκησης Επιχειρήσεων">
              <option value="badmin">Διοίκησης Επιχειρήσεων</option>
              <option value="tourism">Διοίκησης Τουρισμού</option>
              <option value="managementsci">Διοικητικής Επιστήμης και Τεχνολογίας</option>
              <option value="econ">Οικονομικών Επιστημών</option>
            </optgroup>

            <optgroup label="Σχολή Ανθρωπιστικών & Κοινωνικών Επιστημών">
              <option value="edu">Επιστημών της Εκπαίδευσης και Κοινωνικής Εργασίας</option>
              <option value="eduearly">Επιστημών της Εκπαίδευσης και της Αγωγής στην Προσχολική Ηλικία</option>
              <option value="theatre">Θεατρικών Σπουδών</option>
              <option value="history">Ιστορίας - Αρχαιολογίας</option>
              <option value="philology">Φιλολογίας</option>
              <option value="philosophy">Φιλοσοφίας</option>
            </optgroup>

            <optgroup label="Σχολή Γεωπονικών Επιστημών">
              <option value="sustagri">Αειφορικής Γεωργίας</option>
              <option value="fish">Αλιείας και Υδατοκαλλιεργειών</option>
              <option value="agri">Γεωπονίας</option>
              <option value="foodsci">Επιστήμης και Τεχνολογίας Τροφίμων</option>
            </optgroup>

          </select>

        <label for="year">Τρέχον Έτος<span class="required">*</span>:</label>
          <select id="year" name="year" required>
            <option value="" disabled selected>Επιλέξτε Έτος...</option>
            <option value="1">1ο</option>
            <option value="2">2ο</option>
            <option value="3">3ο</option>
            <option value="4">4ο </option>
            <option value="5">5ο (Πολυτεχνικές / Γεωπονικές)</option>
            <option value="6">6ο (Ιατρική)</option>
            <option value="over_duration">Επί Πτυχίω</option>
          </select>

        <label for="name">Ονοματεπώνυμο<span class="required">*</span>:</label>
        <input type="text" name="name" id="name" value="ΡΟΥΒΑΣ ΣΑΚΗΣ" readonly>

        <label for="email">Email<span class="required">*</span>:</label> 
        <input type="email" name="email" id="email" value="up1091234@ac.upatras.gr" readonly>
      </div>
      
      <div class="right-column">
        <label for="description">Περιγραφή Αιτήματος<span class="required">*</span>:</label>
        <textarea id="description" name="description" placeholder="Περιγράψτε αναλυτικά το αίτημά σας..." required></textarea>
        
        <button type="submit" class="submit-btn">Υποβολή</button>
      </div>

    </form>
  </article>
</main>
</body>

</html>
