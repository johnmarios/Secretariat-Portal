<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Νέο Αίτημα - Secretariat Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <link href="../css/style.css" rel="stylesheet">
  <link href="../css/navbar.css" rel="stylesheet">
  <script src="../js/script.js" defer></script>
  <script src="../js/profile.js" defer></script>

</head>

<body class="ticket-submit">
  <nav class="navbar tickets-navbar viewtickets-page sticky-top navbar-expand-md">
    <div class="container-fluid">

      <!-- Brand -->
      <a class="navbar-brand gap-2" href="../index.html#opening-section">
        <img src="../images/University_hat_icon.svg">
        <span>Secretariat Portal</span>
      </a>

      <!-- searchbar -->
      <div class="search-bar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#A0A0A0" stroke-width="2">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" placeholder="Αναζήτηση...">
      </div>

      <!-- collapsed menu -->
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>


      <!-- Menu -->
      <div class="collapse navbar-collapse" id="navbarNav">

        <ul class="navbar-nav ms-auto align-items-md-center">
          <!--Αιτήματα-->
          <li class="nav-item requests">
            <a class="nav-link" href="admin_viewtickets.html">
              <img src="../images/ticket_icon.svg" alt="ticket-svg" class="nav-icon me-2">
              <span>Αιτήματα</span>
            </a>
          </li>
          <!-- User -->
          <li class="nav-item user-icon profile-wrapper">
            <a class="nav-link" href="#" aria-label="Profile menu">
              <img alt="Avatar" id="avatar">
            </a>
            <div class="profile-dropdown"><a href="login_screen.html"><img src="../images/exit.svg" alt=""
                  class="nav-icon">Αποσύνδεση</a>
            </div>
          </li>
        </ul>

      </div>
    </div>
  </nav>

  <main>
    <article class="form-card">
      <div class="card-header">
        <h1>Δημιουργία Αιτήματος</h1>
      </div>

      <form action="#" class="form-grid">

        <div class="left-column">
          <label for="firstName">Θέμα<span class="required">*</span>:</label>
          <input type="text" name="name" id="firstName" required>

          <label for="onomateponumo">Ονοματεπώνυμο<span class="required">*</span>:</label>
          <input type="text" name="onomateponumo" id="onomateponumo" required>

          <label for="email">Email<span class="required">*</span>:</label>
          <input type="email" name="email" id="email" required>

          <label for="fileUpload">Επισύναψη Αρχείου:</label>
          <input type="file" id="fileUpload" name="fileUpload">
        </div>

        <div class="right-column">
          <label for="description">Περιγραφή Αιτήματος<span class="required">*</span>:</label>
          <textarea id="description" name="description" placeholder="Περιγράψτε αναλυτικά το αίτημά σας..."
            required></textarea>

          <button type="submit" class="submit-btn">Υποβολή</button>
        </div>

      </form>
    </article>
  </main>
</body>

</html>
